name: controller-release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PATH: ghcr.io/${{ github.repository }}
  CHART_REPO: ghcr.io/${{ github.repository_owner }}/charts
  CHART_NAME: dns-api

jobs:
  push-container-image:
    name: Push controller image to registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: |
            ${{ env.IMAGE_PATH }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  push-helm-chart:
    name: Push Helm chart to registry
    needs:
      - push-container-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: jetify-com/devbox-install-action@v0.13.0
        with:
          devbox-version: 0.17.2
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Set versions
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "CHART_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "CHART_VERSION=0.0.0-edge" >> "$GITHUB_ENV"
            echo "APP_VERSION=edge" >> "$GITHUB_ENV"
          fi
      - name: Check chart
        run: devbox run -- task controller-chart:check CHART_VERSION="$CHART_VERSION" APP_VERSION="$APP_VERSION"
      - name: Package chart
        run: helm package --app-version "$APP_VERSION" --version "$CHART_VERSION" deploy/charts/${{ env.CHART_NAME }}
      - name: Helm login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username "${{ github.actor }}" --password-stdin
      - name: Push chart
        run: helm push ./${{ env.CHART_NAME }}-*.tgz oci://${{ env.CHART_REPO }}
