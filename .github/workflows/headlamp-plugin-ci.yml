name: headlamp-plugin-ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jetify-com/devbox-install-action@v0.13.0
        with:
          devbox-version: 0.17.2
      - run: devbox run -- task ui:install
      - run: devbox run -- task headlamp-plugin:check
      - run: devbox run -- task headlamp-plugin:package
      - run: devbox run -- task headlamp-plugin:artifacthub-metadata
