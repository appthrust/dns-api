apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-api-controller-manager
  namespace: dns-api-system
  labels:
    app.kubernetes.io/name: dns-api
    app.kubernetes.io/component: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dns-api
      app.kubernetes.io/component: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dns-api
        app.kubernetes.io/component: controller-manager
    spec:
      serviceAccountName: dns-api-controller-manager
      containers:
        - name: manager
          image: dns-api-controller
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --endpoint-recordset-namespace=dns-api-system
          ports:
            - name: metrics
              containerPort: 8080
            - name: healthz
              containerPort: 8081
            - name: webhook-server
              containerPort: 9443
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: dns-api-webhook-server-cert
