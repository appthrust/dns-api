  group: dns.appthrust.io
  names:
    kind: RecordSet
    listKind: RecordSetList
    plural: recordsets
    singular: recordset
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.zoneRef.name
      name: Zone
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.name
      name: Record
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RecordSet represents one DNS record set attached to one Zone.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              a:
                description: A defines a standard A record body.
                properties:
                  addresses:
                    description: Addresses contains IPv4 addresses.
                    items:
                      pattern: ^((25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])$
                      type: string
                    minItems: 1
                    type: array
                required:
                - addresses
                type: object
              aaaa:
                description: AAAA defines a standard AAAA record body.
                properties:
                  addresses:
                    description: Addresses contains IPv6 addresses.
                    items:
                      type: string
                    minItems: 1
                    type: array
                required:
                - addresses
                type: object
              adoption:
                description: Adoption selects an existing external record set to manage.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              caa:
                description: CAA defines a standard CAA record body.
                properties:
                  records:
                    description: Records contains Certification Authority Authorization
                      entries.
                    items:
                      properties:
                        flags:
                          description: Flags is the CAA flags field.
                          format: int32
                          maximum: 255
                          minimum: 0
                          type: integer
                        tag:
                          description: Tag is the lowercase ASCII CAA property tag.
                          minLength: 1
                          pattern: ^[a-z0-9]+$
                          type: string
                        value:
                          description: Value is the CAA property value.
                          minLength: 1
                          type: string
                      required:
                      - flags
                      - tag
                      - value
                      type: object
                    minItems: 1
                    type: array
                required:
                - records
                type: object
              cname:
                description: CNAME defines a standard CNAME record body.
                properties:
                  target:
                    description: Target contains the canonical target DNS name without
                      a trailing root dot.
                    minLength: 1
                    type: string
                required:
                - target
                type: object
              mx:
                description: MX defines a standard MX record body.
                properties:
                  records:
                    description: Records contains mail exchange entries.
                    items:
                      properties:
                        exchange:
                          description: |-
                            Exchange contains the canonical mail server DNS name without a trailing root dot.
                            Use "." with preference 0 for Null MX.
                          minLength: 1
                          type: string
                        preference:
                          description: Preference is the MX priority. Lower values
                            have higher priority.
                          format: int32
                          maximum: 65535
                          minimum: 0
                          type: integer
                      required:
                      - exchange
                      - preference
                      type: object
                    minItems: 1
                    type: array
                required:
                - records
                type: object
              name:
                description: Name is the relative DNS owner name in the Zone.
                minLength: 1
                type: string
              ns:
                description: NS defines a standard delegated NS record body.
                properties:
                  nameServers:
                    description: NameServers contains delegated name server DNS names
                      without trailing root dots.
                    items:
                      type: string
                    minItems: 1
                    type: array
                required:
                - nameServers
                type: object
              options:
                description: Options contains provider-specific record options.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              provider:
                description: Provider references a Provider version.
                properties:
                  name:
                    description: Name is the cluster-scoped Provider resource name.
                    minLength: 1
                    type: string
                  version:
                    description: Version is the Provider version name.
                    minLength: 1
                    type: string
                required:
                - name
                - version
                type: object
              ttl:
                description: TTL is the record TTL in seconds.
                format: int32
                maximum: 2147483647
                minimum: 1
                type: integer
              txt:
                description: TXT defines a standard TXT record body.
                properties:
                  values:
                    description: Values contains logical TXT resource record values.
                    items:
                      type: string
                    minItems: 1
                    type: array
                required:
                - values
                type: object
              type:
                description: Type is the DNS record type.
                enum:
                - A
                - AAAA
                - CNAME
                - NS
                - TXT
                - MX
                - CAA
                type: string
              zoneRef:
                description: ZoneRef selects the Zone that owns this record set.
                properties:
                  name:
                    description: Name is the Zone name.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace defaults to the RecordSet namespace when
                      omitted.
                    type: string
                required:
                - name
                type: object
            required:
            - name
            - provider
            - type
            - zoneRef
            type: object
            x-kubernetes-validations:
            - message: zoneRef is immutable
              rule: self.zoneRef == oldSelf.zoneRef
            - message: provider is immutable
              rule: '!has(oldSelf.provider) || self.provider == oldSelf.provider'
            - message: type is immutable
              rule: self.type == oldSelf.type
            - message: name is immutable
              rule: self.name == oldSelf.name
          status:
            properties:
              conditions:
                description: Conditions include Accepted and Programmed.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the RecordSet generation reflected
                  by this status.
                format: int64
                type: integer
              provider:
                description: Provider contains provider-specific public status.
                properties:
                  data:
                    description: Data contains public provider-specific structured
                      status.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  state:
                    description: State contains provider-controller internal state.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                type: object
              zone:
                description: Zone describes the resolved Zone relationship.
                properties:
                  ref:
                    description: Ref is the Zone that this RecordSet is attached to.
                    properties:
                      name:
                        description: Name is the object name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace is the object namespace.
                        minLength: 1
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                required:
                - ref
                type: object
            type: object
        type: object
